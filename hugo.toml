baseURL = "https://theuntextured.github.io/"
title = "CV: Riccardo Giorgi"
defaultContentLanguage = "it"
defaultContentLanguageInSubdir = false
languageCode = "it"
# Relative links so language/theme controls work on localhost and production
relativeURLs = true

# Footer is embedded on the home page only (not a public section)
disableKinds = ["footerSection", "taxonomy", "term"]

[taxonomies]
tag = "tags"
category = "categories"
author = "authors"

[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML"]
  footer = []

[outputFormats.footerSection]

[module]
[[module.imports]]
path = "github.com/zetxek/adritian-free-hugo-theme"

[[module.mounts]]
source = "archetypes"
target = "archetypes"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "i18n"
target = "i18n"

[[module.mounts]]
source = "layouts"
target = "layouts"

[[module.mounts]]
source = "static"
target = "static"

[[module.mounts]]
source = "node_modules/bootstrap/scss"
target = "assets/scss/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js"
target = "assets/js/bootstrap"

[[module.mounts]]
source = "node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"
target = "assets/js/vendor/bootstrap.bundle.min.js"

[[module.mounts]]
source = "node_modules/bootstrap-print-css/css/bootstrap-print.css"
target = "assets/css/bootstrap-print.css"

# --- Site metadata ---

[params]
title = "Riccardo Giorgi — CV"
description = "CV di Riccardo Giorgi: studente di ingegneria meccanica al Politecnico di Torino."
images = ["/img/og-img.png"]
themeColor = "#478079"

[params.seo]
siteName = "Riccardo Giorgi"
siteDescription = "CV di Riccardo Giorgi: studente di ingegneria meccanica al Politecnico di Torino; programmazione e strumenti 3D come competenze di supporto."
siteImage = "/img/og-img.png"

[params.seo.person]
name = "Riccardo Giorgi"
url = "https://theuntextured.github.io/"
sameAs = [
  "https://github.com/Theuntextured",
  "https://www.linkedin.com/in/riccardo-giorgi-67b1b2240/",
  "https://www.fab.com/sellers/The%20untextured%20Dev",
  "https://www.credly.com/badges/286b9940-d45e-47c7-855e-a76377268bc5/",
]
sections = [
  "showcase",
  "about",
  "education",
  "experience",
  "contact",
]

homepageExperienceCount = 4

[params.favicons]
source = "icons/favicon.png"

[params.experience]
showJobCard = true

[params.languages.selector.disable]
footer = false
header = false
mobileHeader = false

[params.colorTheme.selector.disable]
footer = false
header = false
mobileHeader = false

[params.analytics]
vercelPageInsights = false
vercelAnalytics = false

[params.analytics.googleAnalytics]
enabled = false

[params.analytics.googleTagManager]
enabled = false

# Theme assets (keep in sync with assets/css and assets/scss in this repo)

[params.plugins]

[[params.plugins.css]]
URL = "css/custom.css"

[[params.plugins.css]]
URL = "css/adritian-icons.css"

[[params.plugins.css]]
URL = "css/bootstrap-print.css"

# Note: params.plugins.js is not used by this theme for loading scripts.
# Site scripts belong in static/js/ (see layouts/_default/baseof.html).

[[params.plugins.scss]]
URL = "scss/adritian.scss"

