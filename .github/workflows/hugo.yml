# Build and deploy this Hugo site to GitHub Pages.
#
# One-time repo setup (required or deploy fails):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   (Not "Deploy from a branch".)
#
# Workflow permissions (Settings → Actions → General → Workflow permissions):
#   "Read and write permissions" (or at least allow GITHUB_TOKEN to write Pages).
name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve GitHub Pages base URL
        id: baseurl
        run: |
          owner="${{ github.repository_owner }}"
          repo="${{ github.event.repository.name }}"
          if [ "$repo" = "${owner}.github.io" ]; then
            echo "url=https://${owner}.github.io/" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://${owner}.github.io/${repo}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Node.js dependencies
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Hugo mod get
        run: hugo mod get

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.baseurl.outputs.url }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
